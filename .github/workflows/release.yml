name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      platform:
        description: 'Build platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - win
          - mac
          - linux
  push:
    tags:
      - v*.*.*

  pull_request_target:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include: >-
          ${{ fromJSON(
            (github.event_name == 'push' || github.event_name == 'pull_request_target' || inputs.platform == 'all') && '[
              {"os": "macos-latest", "platform": "mac", "arch": "arm64", "build_command": "pnpm build:mac:arm64"},
              {"os": "macos-13", "platform": "mac", "arch": "x64", "build_command": "pnpm build:mac:x64"},
              {"os": "windows-latest", "platform": "win", "arch": "x64", "build_command": "pnpm build:win:x64"},
              {"os": "windows-11-arm", "platform": "win", "arch": "arm64", "build_command": "pnpm build:win:arm64"},
              {"os": "ubuntu-latest", "platform": "linux", "arch": "x64", "build_command": "pnpm build:linux:x64"},
              {"os": "ubuntu-24.04-arm", "platform": "linux", "arch": "arm64", "build_command": "pnpm build:linux:arm64"}
            ]' ||
            inputs.platform == 'mac' && '[
              {"os": "macos-latest", "platform": "mac", "arch": "arm64", "build_command": "pnpm build:mac:arm64"},
              {"os": "macos-13", "platform": "mac", "arch": "x64", "build_command": "pnpm build:mac:x64"}
            ]' ||
            inputs.platform == 'win' && '[
              {"os": "windows-latest", "platform": "win", "arch": "x64", "build_command": "pnpm build:win:x64"},
              {"os": "windows-11-arm", "platform": "win", "arch": "arm64", "build_command": "pnpm build:win:arm64"}
            ]' ||
            inputs.platform == 'linux' && '[
              {"os": "ubuntu-latest", "platform": "linux", "arch": "x64", "build_command": "pnpm build:linux:x64"},
              {"os": "ubuntu-24.04-arm", "platform": "linux", "arch": "arm64", "build_command": "pnpm build:linux:arm64"}
            ]' || '[]'
          ) }}
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || '' }}

      - name: Set version
        shell: bash
        run: |
          npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Install Dependencies
        run: pnpm install

      - name: Install macOS deps
        if: matrix.platform == 'mac'
        run: brew install python-setuptools

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libevdev-dev libxtst-dev libx11-dev libxfixes-dev libwayland-dev

      - name: Prepare env file
        shell: bash
        run: cp -f .env.example .env

      - name: Build
        shell: bash
        run: ${{ matrix.build_command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Rename Windows Build Metadata
        if: matrix.platform == 'win'
        shell: bash
        run: |
          if [ -f dist/latest.yml ]; then
            mv dist/latest.yml dist/latest-win-${{ matrix.arch }}.yml
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: zyfun-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/latest*.yml
          if-no-files-found: ignore
          retention-days: 1
          compression-level: 8

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Merge Windows Update Metadata
        shell: bash
        run: |
          set -e

          WIN_X64="dist/latest-win-x64.yml"
          WIN_ARM="dist/latest-win-arm64.yml"

          if [[ -f "$WIN_X64" && -f "$WIN_ARM" ]]; then
            yq eval-all 'select(fi == 0) .files += [select(fi == 1) .files[]] | select(fi == 0)' "$WIN_X64" "$WIN_ARM" > dist/latest.yml
            rm -f "$WIN_X64" "$WIN_ARM"
            exit 0
          elif [[ -f "$WIN_X64" ]]; then
            mv "$WIN_X64" dist/latest.yml
          elif [[ -f "$WIN_ARM" ]]; then
            mv "$WIN_ARM" dist/latest.yml
          fi

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          draft: true
          allowUpdates: true
          makeLatest: false
          tag: ${{ needs.prepare.outputs.tag }}
          artifacts: 'dist/*'
          token: ${{ secrets.GITHUB_TOKEN }}
